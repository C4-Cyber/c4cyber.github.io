<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found | C4 Cyber</title>
  <link rel="icon" type="image/png" href="/assets/img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0a0e17; --text:#e7ecf5; --muted:#9aa7c0; --accent:#35d0e0; --navy:#3a5bc7; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; text-align:center;
      background:var(--bg); color:var(--text); font-family:"Inter",system-ui,sans-serif; padding:2rem; }
    .wrap { max-width:520px; }
    img { width:72px; height:72px; margin:0 auto 1.6rem; }
    h1 { font-family:"Space Grotesk",sans-serif; font-size:clamp(3rem,10vw,5rem); margin:0; letter-spacing:-.03em;
      background:linear-gradient(120deg,#fff,var(--accent)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    p { color:var(--muted); font-size:1.1rem; margin:.6rem 0 2rem; }
    a { display:inline-flex; align-items:center; gap:.5em; font-family:"Space Grotesk",sans-serif; font-weight:600;
      color:#fff; text-decoration:none; background:linear-gradient(135deg,var(--navy),var(--accent));
      padding:.85em 1.7em; border-radius:999px; }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="/assets/img/logo-mark.png" alt="C4 Cyber" />
    <h1>404</h1>
    <p>That page has slipped through the cracks. Let's get you back to safety.</p>
    <a href="/">Return home</a>
  </div>
</body>
</html>
